onclick="submit3()">Submit</button></div>
<script>

let points = 0;  
function updatepoints(){ 
            document.getElementById("display-points").innerText = points;
            }
status1= document.getElementById("status1");
status2= document.getElementById("status2"); 
status3= document.getElementById("status3");
function yell_wheres_yo_link_boi(){
    alert("YO WHERES YOUR LINK??!!!")
}
let task1clicked = 0;

let status = "";
function upd(status){
    document.getElementById(status).innerText = "Submitted"; 
    document.getElementById(status).style.backgroundColor = "green"; 
    document.getElementById(status).style.cursor = "none";
}
function submit1(){
    val = document.getElementById('1link').value.trim();
    if(task3clicked>0){
        task3clicked=0;
        return;
    }  else{
    if (!val){ 
        yell_wheres_yo_link_boi();
    }
    else if (val){ 
        points += 100;  
        updatepoints();       
        upd(status="status1"); 

    } 
    task3clicked += 1;
}
}



function submit2(){
    val = document.getElementById('2link').value.trim();

}

function submit3(){

}

    function showletter(){ 
        let firstname = prompt("Enter your first name"); 
        if (firstname) { 
            document.getElementById("display-name").innerText = firstname; document.getElementById("ppp").style.display = "block";
        }
        else{ 
            alert("Please Enter a name!")

    function letter(){

        }
